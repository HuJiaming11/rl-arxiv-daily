# TODO: add papers by configuration file
base_url: "https://arxiv.paperswithcode.com/api/v0/papers/"
user_name: "HuJiaming11"
repo_name: "rl-arxiv-daily"
show_authors: True
show_links: True
show_badge: True
max_results: 10
# 最终要筛选的论文数量（启用领域筛选时生效）
# 如果不设置，默认使用 max_results 的值
final_max_results: 10

publish_readme: True
publish_gitpage: True
publish_wechat: False

# file paths
json_readme_path: './docs/cv-arxiv-daily.json'
json_gitpage_path: './docs/cv-arxiv-daily-web.json'
json_wechat_path: './docs/cv-arxiv-daily-wechat.json'

md_readme_path: 'README.md'
md_gitpage_path: './docs/index.md'
md_wechat_path: './docs/wechat.md'

# keywords to search
keywords:
    "Reinforcement Learning":
        filters: [
            "Reinforcement",
            "Reinforcement Learning",
            "GRPO"
        ]
    "Imitation Learning & SFT":
        filters: [
            "Imitation Learning",
            "Supervised Fine-tuning",
            "Vision-Language-Action Fine-tuning",
            "VLA Fine-tuning",
            "Diffusion Policy",
            "Flow-matching"
        ]

# 二次筛选关键词：用于在获取的论文中进行领域过滤
domain_filters:
    autonomous_driving:
        - "Autonomous Driving"
        - "Self-driving"
        - "Self driving"
        - "Autonomous vehicle"
        - "Autonomous vehicles"
        - "Intelligent vehicle"
        - "Intelligent vehicles"
        - "Vehicle control"
        - "path plan"
        - "trajectory plan"
        - "motion plan"
    robotics:
        - "Robot"
        - "Robotics"
        - "Robotic"
        - "Manipulation"
        - "Mobile robot"
        - "Mobile robots"
        - "Robotic control"
        - "Robot control"
        - "Embodied"
        - "Embodied AI"

# 大模型API配置
llm_enabled: True  # 是否启用大模型论文总结功能
llm_api_key: "your_zhipu_ai_api_key_here"  # 智谱AI API密钥（可以通过环境变量ZHIPU_API_KEY设置，推荐使用GitHub Secrets）
llm_model: "glm-4"  # 模型名称
llm_max_retries: 3  # API调用失败时的最大重试次数
llm_timeout: 60  # API调用超时时间（秒）
llm_verify_ssl: False  # 是否验证SSL证书（由于网络环境SSL证书问题，暂时设为False）
