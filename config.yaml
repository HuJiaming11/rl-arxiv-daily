# TODO: add papers by configuration file
base_url: "https://arxiv.paperswithcode.com/api/v0/papers/"
user_name: "HuJiaming11"
repo_name: "rl-arxiv-daily"
show_authors: True
show_links: True
show_badge: True
max_results: 10

publish_readme: True
publish_gitpage: True
publish_wechat: False

# file paths
json_readme_path: './docs/cv-arxiv-daily.json'
json_gitpage_path: './docs/cv-arxiv-daily-web.json'
json_wechat_path: './docs/cv-arxiv-daily-wechat.json'

md_readme_path: 'README.md'
md_gitpage_path: './docs/index.md'
md_wechat_path: './docs/wechat.md'

# keywords to search
keywords:
    "Reinforcement Learning":
        filters: [
            "Reinforcement",
            "Reinforcement Learning",
            "GRPO"
        ]
    "Imitation Learning & SFT":
        filters: [
            "Imitation Learning",
            "Supervised Fine-tuning",
            "Vision-Language-Action Fine-tuning",
            "VLA Fine-tuning",
            "Diffusion Policy",
            "Flow-matching"
        ]

# 二次筛选关键词：用于在获取的论文中进行领域过滤
domain_filters:
    autonomous_driving:
        - "Autonomous Driving"
        - "Self-driving"
        - "Self driving"
        - "Autonomous vehicle"
        - "Autonomous vehicles"
        - "Intelligent vehicle"
        - "Intelligent vehicles"
        - "Vehicle control"
        - "path plan"
        - "trajectory plan"
        - "motion plan"
    robotics:
        - "Robot"
        - "Robotics"
        - "Robotic"
        - "Manipulation"
        - "Mobile robot"
        - "Mobile robots"
        - "Robotic control"
        - "Robot control"
        - "Embodied"
        - "Embodied AI"
